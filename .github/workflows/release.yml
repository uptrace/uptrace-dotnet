name: Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Check that the tag matches the package version
        run: |
          version=$(sed -n 's|.*<Version>\(.*\)</Version>.*|\1|p' src/Uptrace.OpenTelemetry/Uptrace.OpenTelemetry.csproj)
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match <Version>$version</Version> in the csproj"
            exit 1
          fi

      - name: Pack
        run: dotnet pack -c Release src/Uptrace.OpenTelemetry/Uptrace.OpenTelemetry.csproj

      - name: Push to nuget.org
        run: |
          dotnet nuget push src/Uptrace.OpenTelemetry/bin/Release/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate

      - uses: ncipollo/release-action@v1
        with:
          body:
            Please refer to
            [CHANGELOG.md](https://github.com/uptrace/uptrace-dotnet/blob/master/CHANGELOG.md) for
            details
